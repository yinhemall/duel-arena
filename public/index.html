<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DUEL ARENA - 登入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="rotate-overlay">
  <div class="rotate-icon">📱</div>
  <h2>請將手機橫向</h2>
  <p>DUEL ARENA 需要橫向畫面才能遊玩</p>
</div>

<div id="game-root">
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <section id="screen-auth" class="screen active">
    <div class="auth-card glass">
      <div class="brand">
        <span class="brand-mark">⬡</span>
        <h1>DUEL ARENA</h1>
        <p class="tagline">即時對決 · 贏家全拿</p>
      </div>

      <div class="tab-switch">
        <button class="tab-btn active" data-tab="login">登入</button>
        <button class="tab-btn" data-tab="register">註冊</button>
      </div>

      <form id="form-auth" autocomplete="off">
        <div class="input-group">
          <label>使用者名稱</label>
          <input type="text" id="input-username" placeholder="至少 3 個字元" required minlength="3" maxlength="20">
        </div>
        <div class="input-group">
          <label>密碼</label>
          <input type="password" id="input-password" placeholder="至少 4 個字元" required minlength="4">
        </div>
        <p id="auth-error" class="error-text"></p>
        <button type="submit" id="btn-auth-submit" class="btn-primary glow">
          <span id="btn-auth-label">登入</span>
        </button>
      </form>
    </div>
  </section>
</div>

<script src="auth.js"></script>
</body>
</html>
